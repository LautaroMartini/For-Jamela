    // Compact Romantic Audio Synthesizer
    class CompactRomanceSynth {
  constructor() {
    this.audio = new Audio(
      "https://cdn.discordapp.com/attachments/1201647052707340419/1511479636016627823/10_Minute_Timer_Chill_lofi_timer_for_study_-_Milli_Lofi_Timer.mp3?ex=6a209a9b&is=6a1f491b&hm=1235668c811eec3a2a5c5f21eb41d050e1e1d22f93810f6be26c24c23cbcb913&"
    );

    this.audio.loop = true;
    this.audio.volume = 0.5;
    this.isPlaying = false;
  }

  async start() {
    try {
      await this.audio.play();
      this.isPlaying = true;
    } catch (e) {
      console.error(e);
    }
  }

  stop() {
    this.audio.pause();
    this.isPlaying = false;
  }

  toggle() {
    if (this.isPlaying) {
      this.stop();
      return false;
    } else {
      this.start();
      return true;
    }
  }

  active() {
    return this.isPlaying;
  }

  triggerChime() {}

  triggerCelebration() {}
}
    const romanceSynth = new CompactRomanceSynth();

    // Procedural Floating Hearts & Circles Particles Canvas
    function ParticleBackground({ intensity = 'calm', triggerExplode }) {
      const canvasRef = useRef(null);
      const particles = useRef([]);
      const colors = ['rgba(244,162,185,A)', 'rgba(173,216,230,A)', 'rgba(255,218,185,A)', 'rgba(230,210,250,A)'];

      const createParticle = (w, h, bottom = false) => ({
        x: Math.random() * w,
        y: bottom ? h + 15 : Math.random() * h,
        size: Math.random() > 0.45 ? 6 + Math.random() * 8 : 3 + Math.random() * 4,
        speedY: -(0.5 + Math.random() * 1.2),
        speedX: (Math.random() - 0.5) * 0.6,
        alpha: 0.2 + Math.random() * 0.4,
        color: colors[Math.floor(Math.random() * colors.length)],
        isHeart: Math.random() > 0.35,
        phase: Math.random() * Math.PI * 2,
        pulseSpeed: 0.01 + Math.random() * 0.02
      });

      const explode = (w, h, x, y) => {
        for (let i = 0; i < 60; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2.0 + Math.random() * 4.5;
          particles.current.push({
            x, y,
            size: 8 + Math.random() * 10,
            speedX: Math.cos(angle) * speed,
            speedY: Math.sin(angle) * speed - 1.2,
            alpha: 0.95,
            color: colors[Math.floor(Math.random() * colors.length)],
            isHeart: Math.random() > 0.3,
            phase: 0,
            pulseSpeed: 0
          });
        }
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let w = canvas.width = canvas.parentNode.clientWidth;
        let h = canvas.height = canvas.parentNode.clientHeight;

        const handleResize = () => {
          if (!canvas.parentNode) return;
          w = canvas.width = canvas.parentNode.clientWidth;
          h = canvas.height = canvas.parentNode.clientHeight;
        };
        window.addEventListener('resize', handleResize);

        const count = intensity === 'dense' ? 80 : (intensity === 'cascade' ? 120 : 35);
        particles.current = Array.from({ length: count }, () => createParticle(w, h));

        let animId;
        const render = () => {
          ctx.clearRect(0, 0, w, h);
          const ps = particles.current;
          for (let i = ps.length - 1; i >= 0; i--) {
            const p = ps[i];
            p.x += p.speedX;
            p.y += p.speedY;
            if (p.pulseSpeed > 0) {
              p.phase += p.pulseSpeed;
              p.alpha = 0.2 + Math.sin(p.phase) * 0.15;
            } else {
              p.alpha -= 0.012;
            }

            if (p.alpha <= 0 || p.y < -20 || p.x < -20 || p.x > w + 20) {
              if (ps.length < (intensity === 'dense' ? 100 : (intensity === 'cascade' ? 130 : 45))) {
                ps[i] = createParticle(w, h, true);
              } else {
                ps.splice(i, 1);
              }
              continue;
            }

            ctx.fillStyle = p.color.replace('A', p.alpha.toFixed(2));
            if (p.isHeart) {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y - p.size / 4);
              ctx.bezierCurveTo(p.x + p.size / 2, p.y - p.size, p.x + p.size, p.y - p.size / 3, p.x, p.y + p.size);
              ctx.bezierCurveTo(p.x - p.size, p.y - p.size / 3, p.x - p.size / 2, p.y - p.size, p.x, p.y - p.size / 4);
              ctx.fill();
            } else {
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          animId = requestAnimationFrame(render);
        };
        render();

        return () => {
          cancelAnimationFrame(animId);
          window.removeEventListener('resize', handleResize);
        };
      }, [intensity]);

      useEffect(() => {
        if (triggerExplode) {
          explode(canvasRef.current.width, canvasRef.current.height, canvasRef.current.width / 2, canvasRef.current.height * 0.4);
        }
      }, [triggerExplode]);

      return (
        <div className="absolute inset-0 w-full h-full pointer-events-none overflow-hidden z-10" id="particle-overlay">
          <canvas ref={canvasRef} className="absolute inset-0 w-full h-full block" />
        </div>
      );
    }

    // Audio HUD sound controls
    function AudioToggle() {

          </button>
        </div>
      );
    }

      // Sim loading progress bar

                          <Icon name="Gift" className="w-4 h-4 text-pink-400 mb-1" />
                          <span className="block text-[9px] text-slate-400 uppercase tracking-wider font-semibold">distance status</span>
                          <span className="block text-xs font-mono text-pink-500 font-bold mt-0.5">zero boundaries</span>
                        </div>
                      </div>

                      <p className="text-xs text-pink-500 font-sans font-semibold italic">
                        "i love you so much. thank you for saying yes. 💕"
                      </p>

                      <div className="flex flex-col sm:flex-row justify-center gap-2 pt-2 border-t border-pink-50">
                        <button
                          onClick={() => { romanceSynth.triggerCelebration(); setCheersExplode(true); setTimeout(() => setCheersExplode(false), 3000); }}
                          className="px-4 py-2 bg-pink-100 text-pink-600 font-bold text-[10px] uppercase tracking-wider cursor-pointer rounded-full hover:bg-pink-150 active:scale-95 transition-all w-full sm:w-auto"
                        >
                          more confetti 🎉
                        </button>
                        <button
                          onClick={() => { setStage('intro'); setIsProposalAccepted(false); setNoClickCount(0); setNoBtnCoords(null); }}
                          className="px-4 py-2 border border-pink-100 bg-white text-slate-400 font-medium text-[10px] uppercase tracking-wider cursor-pointer rounded-full hover:bg-slate-50 transition-all w-full sm:w-auto"
                        >
                          reset journey
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

          </main>

          {/* MINIMAL FOOTER HUD */}
          {stage !== 'loading' && (
            <footer className="w-full py-4 text-center text-[10px] text-slate-400 font-sans border-t border-pink-100/50 relative z-30 flex flex-col sm:flex-row items-center justify-between px-6 gap-2" id="footer-hud">
              <span>with infinite love for jamela.</span>
              <button
                onClick={() => { romanceSynth.triggerChime(1.1); setShowSecretNote(true); }}
                className="text-pink-500 hover:text-pink-605 font-serif font-medium transition-all flex items-center gap-1.5 cursor-pointer bg-white px-3 py-1.5 rounded-full border border-pink-100/60 shadow-sm hover:scale-105 active:scale-95 text-[10px]"
              >
                <Icon name="Gift" className="w-3.5 h-3.5 text-pink-400" />
                <span>sweet note from lautaro</span>
              </button>
            </footer>
          )}

          {/* EASTER EGG POPUP MODAL */}
          {showSecretNote && stage !== 'loading' && (
            <div className="fixed inset-0 bg-pink-900/10 backdrop-blur-sm z-[999] flex items-center justify-center p-6 animate-fade-in" id="note-modal">
              <div className="bg-white border border-pink-100 max-w-sm w-full rounded-2xl p-5 relative shadow-lg text-center space-y-4 animate-fade-in scale-100">
                <button
                  onClick={() => setShowSecretNote(false)}
                  className="absolute top-4 right-4 text-pink-300 hover:text-pink-500 font-bold transition-all cursor-pointer w-7 h-7 rounded-full bg-pink-50/50 flex items-center justify-center border border-pink-100/60"
                >
                  ✕
                </button>
                <div className="w-9 h-9 bg-pink-50 rounded-full flex items-center justify-center mx-auto">
                  <Icon name="HeartFilled" className="w-4.5 h-4.5 text-pink-400" />
                </div>
                <div className="space-y-1">
                  <span className="text-[10px] uppercase tracking-wider text-pink-400 font-semibold font-mono">lautaro's personal letter</span>
                  <p className="text-xs text-slate-500 leading-relaxed font-sans font-light text-left overflow-y-auto max-h-[160px] pr-1 custom-scrollbar">
                    "dear beautiful jamela, i literally build this space code just for you. every button, every cute falling heart, and every sentence was written late at night thinking of your sleepy face. finding you across 18,340 kilometers is the absolute best thing that ever happened to my life. even when our time schedules are totally messed up and the distance feels painful, you are always the owner of my heart. thank you for being my peace, my late-night smile, and my favorite soul. te amo muchísimo, beautiful."
                  </p>
                </div>
                <div className="pt-1.5 border-t border-pink-50">
                  <span className="text-[9px] text-pink-400/80 font-mono italic">🇦🇷 Buenos Aires ⇆ Pangasinan 🇵🇭</span>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
